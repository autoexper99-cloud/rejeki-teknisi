<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Histori Transaksi</title>

    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: #f1f5f9;
      }

      .header {
        background: linear-gradient(135deg, #eb5842, #a62511);
        color: white;
        padding: 20px;
        text-align: center;
      }

      .card {
        background: white;
        margin: 20px;
        padding: 30px;
        border-radius: 15px;
      }

      .item {
        display: flex;
        justify-content: space-between;
        margin-top: 10px;
        border-bottom: 1px solid #eee;
        padding-bottom: 10px;
      }

      .income {
        color: green;
      }
      .expense {
        color: red;
      }

      button {
        width: 100%;
        margin-top: 10px;
        padding: 10px;
        border-radius: 10px;
        border: none;
        background: #eb5842;
        color: white;
      }

      input {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border-radius: 10px;
        border: 1px solid #ddd;
      }

      a {
        display: block;
        margin: 10px;
        text-align: center;
        text-decoration: none;
        color: #eb5842;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <h2>Histori Transaksi</h2>
    </div>

    <!-- FILTER -->
    <div class="card">
      <h3>Filter</h3>

      <label>Harian</label>
      <input type="date" id="filterTanggal" />

      <label>Bulanan</label>
      <input type="month" id="filterBulan" />

      <button onclick="applyFilter()">Filter</button>
      <button onclick="resetFilter()">Reset</button>
    </div>

    <!-- LIST -->
    <div class="card">
      <div id="list">Loading...</div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import {
        getFirestore,
        collection,
        getDocs,
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDqjEEMwdxNqqnTdTVOeQN5kFA-zXGkgco",
        authDomain: "keuangan-app-a4183.firebaseapp.com",
        projectId: "keuangan-app-a4183",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      let semuaData = [];
      let data = [];

      // 🔄 LOAD DATA
      async function loadData() {
        const snapshot = await getDocs(collection(db, "transaksi"));

        semuaData = [];
        snapshot.forEach((doc) => semuaData.push(doc.data()));

        data = semuaData;
        render();
      }

      // 🎨 RENDER
      function render() {
        let html = "";

        if (data.length === 0) {
          html = "<p>Tidak ada data</p>";
        }

        data.forEach((d) => {
          const tgl = new Date(d.tanggal);

          html += `
      <div class="item">
        <div>
          <strong>${d.ket}</strong><br>
          <small>${tgl.toLocaleDateString("id-ID")}</small>
        </div>
        <div class="${d.tipe === "masuk" ? "income" : "expense"}">
          ${d.jumlah.toLocaleString("id-ID", {
            style: "currency",
            currency: "IDR",
          })}
        </div>
      </div>
    `;
        });

        document.getElementById("list").innerHTML = html;
      }

      // 🔍 FILTER (VERSI FINAL FIX)
      function applyFilter() {
        const tanggal = document.getElementById("filterTanggal").value;
        const bulan = document.getElementById("filterBulan").value;

        data = semuaData.filter((d) => {
          const tgl = new Date(d.tanggal);

          let matchTanggal = true;
          let matchBulan = true;

          if (tanggal) {
            const inputDate = new Date(tanggal);
            matchTanggal = tgl.toDateString() === inputDate.toDateString();
          }

          if (bulan) {
            const [year, month] = bulan.split("-");
            matchBulan =
              tgl.getFullYear() == year && tgl.getMonth() + 1 == month;
          }

          return matchTanggal && matchBulan;
        });

        render();
      }

      // 🔄 RESET
      function resetFilter() {
        document.getElementById("filterTanggal").value = "";
        document.getElementById("filterBulan").value = "";

        data = semuaData;
        render();
      }

      window.applyFilter = applyFilter;
      window.resetFilter = resetFilter;

      loadData();
    </script>
    <button onclick="location.href = 'index.html'">⬅ Kembali</button>
  </body>
</html>
