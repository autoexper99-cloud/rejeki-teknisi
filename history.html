<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Histori Transaksi</title>

    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: #f1f5f9;
      }

      .header {
        background: #2563eb;
        color: white;
        padding: 20px;
        text-align: center;
      }

      .card {
        background: white;
        margin: 15px;
        padding: 15px;
        border-radius: 15px;
      }

      .item {
        display: flex;
        justify-content: space-between;
        margin-top: 10px;
        border-bottom: 1px solid #eee;
        padding-bottom: 10px;
      }

      .income {
        color: green;
      }
      .expense {
        color: red;
      }

      a {
        display: block;
        margin: 15px;
        text-align: center;
        text-decoration: none;
        color: #2563eb;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <h2>Histori Transaksi</h2>
    </div>

    <a href="index.html">⬅ Kembali</a>

    <div class="card">
      <div id="list">Loading...</div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import {
        getFirestore,
        collection,
        getDocs,
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDqjEEMwdxNqqnTdTVOeQN5kFA-zXGkgco",
        authDomain: "keuangan-app-a4183.firebaseapp.com",
        projectId: "keuangan-app-a4183",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      async function loadData() {
        const snapshot = await getDocs(collection(db, "transaksi"));
        let html = "";

        snapshot.forEach((doc) => {
          const d = doc.data();

          html += `
      <div class="item">
        <div>
          <strong>${d.ket}</strong><br>
          <small>${d.tanggal}</small>
        </div>
        <div class="${d.tipe === "masuk" ? "income" : "expense"}">
          ${d.jumlah.toLocaleString("id-ID", {
            style: "currency",
            currency: "IDR",
          })}
        </div>
      </div>
    `;
        });

        document.getElementById("list").innerHTML = html;
      }

      loadData();
    </script>
  </body>
</html>
