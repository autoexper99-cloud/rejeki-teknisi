<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Histori Rejeki</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: #f1f5f9;
      }

      .header {
        background: linear-gradient(135deg, #eb5842, #a62511);
        color: white;
        padding: 20px;
        text-align: center;
      }

      .card {
        background: white;
        margin: 20px;
        padding: 20px;
        border-radius: 15px;
      }

      .item {
        display: flex;
        justify-content: space-between;
        margin-top: 10px;
        border-bottom: 1px solid #eee;
        padding-bottom: 10px;
      }

      .income {
        color: green;
      }
      .expense {
        color: red;
      }

      button {
        width: 100%;
        margin-top: 10px;
        padding: 10px;
        border-radius: 10px;
        border: none;
        background: #eb5842;
        color: white;
      }

      input {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border-radius: 10px;
        border: 1px solid #ddd;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <h2>Histori Rejeki</h2>
    </div>

    <!-- FILTER -->
    <div class="card">
      <h3>Filter</h3>

      <label>Harian</label>
      <input type="date" id="filterTanggal" />

      <label>Bulanan</label>
      <input type="month" id="filterBulan" />

      <button onclick="applyFilter()">Filter</button>
      <button onclick="resetFilter()">Reset</button>
    </div>

    <!-- TOTAL -->
    <div class="card">
      <h3>Ringkasan</h3>
      <p>Total Saldo: <strong id="totalSaldo">Rp 0</strong></p>
      <p>Total Pemasukan: <strong id="totalMasuk">Rp 0</strong></p>
      <p>Total Pengeluaran: <strong id="totalKeluar">Rp 0</strong></p>
    </div>

    <!-- CHART -->
    <div class="card">
      <h3>Grafik Keuangan</h3>
      <canvas id="chart"></canvas>
    </div>

    <!-- LIST -->
    <div class="card">
      <div id="list">Loading...</div>
    </div>

    <button onclick="location.href = 'index.html'">⬅ Kembali</button>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import {
        getFirestore,
        collection,
        getDocs,
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDqjEEMwdxNqqnTdTVOeQN5kFA-zXGkgco",
        authDomain: "keuangan-app-a4183.firebaseapp.com",
        projectId: "keuangan-app-a4183",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      let semuaData = [];
      let data = [];
      let chart;

      // 🔥 PARSE TANGGAL (SUPPORT LAMA & BARU)
      function parseTanggal(tanggal) {
        if (!tanggal) return new Date();

        if (tanggal.includes("/")) {
          const [day, month, year] = tanggal.split("/");
          return new Date(`${year}-${month}-${day}`);
        }

        return new Date(tanggal);
      }

      // 🔄 LOAD DATA
      async function loadData() {
        const snapshot = await getDocs(collection(db, "transaksi"));

        semuaData = [];
        snapshot.forEach((doc) => semuaData.push(doc.data()));

        data = semuaData;
        render();
      }

      // 🎨 RENDER
      function render() {
        let html = "";
        let saldo = 0;
        let masuk = 0;
        let keluar = 0;

        if (data.length === 0) {
          html = "<p>Tidak ada data</p>";
        }

        data.forEach((d) => {
          const tgl = parseTanggal(d.tanggal);
          const nilai = d.tipe === "keluar" ? -d.jumlah : d.jumlah;

          saldo += nilai;

          if (nilai > 0) masuk += nilai;
          else keluar += Math.abs(nilai);

          html += `
      <div class="item">
        <div>
          <strong>${d.ket}</strong><br>
          <small>${tgl.toLocaleDateString("id-ID")}</small>
        </div>
        <div class="${d.tipe === "masuk" ? "income" : "expense"}">
          ${d.jumlah.toLocaleString("id-ID", {
            style: "currency",
            currency: "IDR",
          })}
        </div>
      </div>
    `;
        });

        document.getElementById("list").innerHTML = html;

        // 💰 TOTAL
        document.getElementById("totalSaldo").innerText = saldo.toLocaleString(
          "id-ID",
          { style: "currency", currency: "IDR" },
        );

        document.getElementById("totalMasuk").innerText = masuk.toLocaleString(
          "id-ID",
          { style: "currency", currency: "IDR" },
        );

        document.getElementById("totalKeluar").innerText =
          keluar.toLocaleString("id-ID", {
            style: "currency",
            currency: "IDR",
          });

        // 📊 CHART
        renderChart(masuk, keluar);
      }

      // 📊 CHART
      function renderChart(masuk, keluar) {
        const ctx = document.getElementById("chart");

        if (chart) {
          chart.destroy();
        }

        chart = new Chart(ctx, {
          type: "doughnut",
          data: {
            labels: ["Pemasukan", "Pengeluaran"],
            datasets: [
              {
                data: [masuk, keluar],
              },
            ],
          },
        });
      }

      // 🔍 FILTER
      function applyFilter() {
        const tanggal = document.getElementById("filterTanggal").value;
        const bulan = document.getElementById("filterBulan").value;

        data = semuaData.filter((d) => {
          const tgl = parseTanggal(d.tanggal);

          let matchTanggal = true;
          let matchBulan = true;

          if (tanggal) {
            const inputDate = new Date(tanggal);
            matchTanggal = tgl.toDateString() === inputDate.toDateString();
          }

          if (bulan) {
            const [year, month] = bulan.split("-");
            matchBulan =
              tgl.getFullYear() == year && tgl.getMonth() + 1 == month;
          }

          return matchTanggal && matchBulan;
        });

        render();
      }

      // 🔄 RESET
      function resetFilter() {
        document.getElementById("filterTanggal").value = "";
        document.getElementById("filterBulan").value = "";

        data = semuaData;
        render();
      }

      window.applyFilter = applyFilter;
      window.resetFilter = resetFilter;

      loadData();
    </script>
  </body>
</html>
