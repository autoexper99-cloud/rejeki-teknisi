<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Histori Rejeki</title>

  <style>

    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #f1f5f9;
      padding-bottom: 40px;
    }

    .header {
      background: linear-gradient(135deg, #eb5842, #a62511);
      color: white;
      padding: 20px;
      text-align: center;
    }

    .card {
      background: white;
      margin: 20px;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    input,
    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    button {
      background: #eb5842;
      color: white;
      border: none;
      font-weight: bold;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid #eee;
    }

    .income {
      color: green;
      font-weight: bold;
    }

    .expense {
      color: red;
      font-weight: bold;
    }

    .back {
      display: block;
      margin: 20px;
      text-align: center;
      text-decoration: none;
      color: #eb5842;
      font-weight: bold;
    }

  </style>
</head>

<body>

  <div class="header">
    <h2>Histori Transaksi</h2>
  </div>

  <a
    href="index.html"
    class="back"
  >
    ← Kembali
  </a>

  <!-- FILTER -->
  <div class="card">

    <h3>Filter</h3>

    <label>Harian</label>
    <input
      type="date"
      id="filterTanggal"
    />

    <label>Bulanan</label>
    <input
      type="month"
      id="filterBulan"
    />

    <button onclick="applyFilter()">
      Filter
    </button>

    <button onclick="resetFilter()">
      Reset
    </button>

  </div>

  <!-- LIST -->
  <div class="card">

    <div id="list">
      Loading...
    </div>

  </div>

  <script type="module">

    import {
      initializeApp
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

    import {
      getFirestore,
      collection,
      getDocs,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDqjEEMwdxNqqnTdTVOeQN5kFA-zXGkgco",
      authDomain: "keuangan-app-a4183.firebaseapp.com",
      projectId: "keuangan-app-a4183",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let semuaData = [];
    let data = [];

    // LOAD
    async function loadData() {

      const q = query(
        collection(db, "transaksi"),
        orderBy("createdAt", "desc")
      );

      const snapshot = await getDocs(q);

      semuaData = [];

      snapshot.forEach((doc) => {
        semuaData.push(doc.data());
      });

      data = semuaData;

      render();

    }

    // RENDER
    function render() {

      let html = "";

      if (data.length === 0) {

        html =
          "<p>Tidak ada data</p>";

      }

      data.forEach((d) => {

        let waktu = "-";

        if (d.createdAt?.seconds) {

          waktu =
            new Date(
              d.createdAt.seconds * 1000
            ).toLocaleString("id-ID");

        }

        html += `

          <div class="item">

            <div>
              <strong>${d.ket}</strong><br>
              <small>${waktu}</small>
            </div>

            <div class="
              ${d.tipe === "masuk"
                ? "income"
                : "expense"}
            ">

              ${d.tipe === "masuk"
                ? "+"
                : "-"}

              ${d.jumlah.toLocaleString(
                "id-ID",
                {
                  style: "currency",
                  currency: "IDR"
                }
              )}

            </div>

          </div>

        `;

      });

      document.getElementById(
        "list"
      ).innerHTML = html;

    }

    // FILTER
    function applyFilter() {

      const tanggal =
        document.getElementById(
          "filterTanggal"
        ).value;

      const bulan =
        document.getElementById(
          "filterBulan"
        ).value;

      data = semuaData.filter((d) => {

        if (!d.createdAt?.seconds)
          return false;

        const tgl =
          new Date(
            d.createdAt.seconds * 1000
          );

        let cocokTanggal = true;
        let cocokBulan = true;

        // FILTER HARIAN
        if (tanggal) {

          const input =
            new Date(tanggal);

          cocokTanggal =
            tgl.getDate() ===
              input.getDate() &&
            tgl.getMonth() ===
              input.getMonth() &&
            tgl.getFullYear() ===
              input.getFullYear();

        }

        // FILTER BULANAN
        if (bulan) {

          const [year, month] =
            bulan.split("-");

          cocokBulan =
            tgl.getFullYear() ==
              year &&
            tgl.getMonth() + 1 ==
              month;

        }

        return cocokTanggal &&
               cocokBulan;

      });

      render();

    }

    // RESET
    function resetFilter() {

      document.getElementById(
        "filterTanggal"
      ).value = "";

      document.getElementById(
        "filterBulan"
      ).value = "";

      data = semuaData;

      render();

    }

    window.applyFilter =
      applyFilter;

    window.resetFilter =
      resetFilter;

    loadData();

  </script>

</body>
</html>
