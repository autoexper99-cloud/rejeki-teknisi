<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>REJEKI TEKNISI</title>

    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: #f1f5f9;
      }

      .header {
        background: linear-gradient(135deg, #eb5842, #a62511);
        color: white;
        padding: 20px;
        border-radius: 0 0 20px 20px;
      }

      .balance {
        font-size: 24px;
        font-weight: bold;
      }

      .card {
        background: white;
        margin: 20px;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      }

      .summary {
        display: flex;
        justify-content: space-between;
      }

      .form input,
      .form select,
      .form button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border-radius: 10px;
        border: 1px solid #ddd;
      }

      .form button {
        background: #eb5842;
        color: white;
        border: none;
        font-weight: bold;
      }

      .list-item {
        display: flex;
        justify-content: space-between;
        margin-top: 10px;
        padding-bottom: 10px;
        border-bottom: 1px solid #eee;
      }

      .income {
        color: green;
      }
      .expense {
        color: red;
      }

      .nav {
        position: fixed;
        bottom: 0;
        width: 100%;
        background: white;
        display: flex;
        justify-content: center;
        padding: 10px;
        border-top: 1px solid #ddd;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <div>Rejeki Terkumpul</div>
      <div class="balance" id="saldo">Rp 0</div>
    </div>

    <div class="card summary">
      <div>
        <div>Pemasukan</div>
        <strong id="masuk">Rp 0</strong>
      </div>
      <div>
        <div>Pengeluaran</div>
        <strong id="keluar">Rp 0</strong>
      </div>
    </div>

    <div class="card form">
      <h3>Tambah Transaksi</h3>
      <input type="text" id="ket" placeholder="Keterangan" />
      <input type="text" id="jumlah" placeholder="Jumlah" />
      <select id="tipe">
        <option value="masuk">Pemasukan</option>
        <option value="keluar">Pengeluaran</option>
      </select>
      <button onclick="tambah()">Tambah</button>
    </div>

    <div class="card">
      <h3>Transaksi</h3>
      <div id="list">Loading...</div>
    </div>

    <div class="nav">
      <div onclick="location.href = 'index.html'">🏠 Home</div>
      <div onclick="location.href = 'history.html'">📄 Histori</div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import {
        getFirestore,
        collection,
        addDoc,
        getDocs,
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDqjEEMwdxNqqnTdTVOeQN5kFA-zXGkgco",
        authDomain: "keuangan-app-a4183.firebaseapp.com",
        projectId: "keuangan-app-a4183",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      let data = [];

      // 🔥 FORMAT INPUT OTOMATIS
      const inputJumlah = document.getElementById("jumlah");

      inputJumlah.addEventListener("input", function () {
        let value = this.value.replace(/\D/g, "");

        if (!value) {
          this.value = "";
          return;
        }

        this.value = Number(value).toLocaleString("id-ID");
      });

      // 🔄 LOAD DATA
      async function loadData() {
        const snapshot = await getDocs(collection(db, "transaksi"));
        data = [];
        snapshot.forEach((doc) => data.push(doc.data()));
        render();
        console.log(snapshot.size);
      }

      // 🎨 RENDER
      function render() {
        let saldo = 0,
          masuk = 0,
          keluar = 0;
        let html = "";

        data.forEach((d) => {
          let nilai = d.tipe === "keluar" ? -d.jumlah : d.jumlah;
          saldo += nilai;

          if (nilai > 0) masuk += nilai;
          else keluar += nilai;

          html += `
      <div class="list-item">
        <div>
          <strong>${d.ket}</strong><br>
          <small>${d.tanggal}</small>
        </div>
        <div class="${d.tipe === "masuk" ? "income" : "expense"}">
          ${nilai.toLocaleString("id-ID", {
            style: "currency",
            currency: "IDR",
          })}
        </div>
      </div>
    `;
        });

        document.getElementById("saldo").innerText = saldo.toLocaleString(
          "id-ID",
          { style: "currency", currency: "IDR" },
        );

        document.getElementById("masuk").innerText = masuk.toLocaleString(
          "id-ID",
          { style: "currency", currency: "IDR" },
        );

        document.getElementById("keluar").innerText = keluar.toLocaleString(
          "id-ID",
          { style: "currency", currency: "IDR" },
        );

        document.getElementById("list").innerHTML = html;
      }

      // ➕ TAMBAH DATA
      async function tambah() {
        const ket = document.getElementById("ket").value;
        const raw = document.getElementById("jumlah").value.replace(/\./g, "");
        const jumlah = parseInt(raw);
        const tipe = document.getElementById("tipe").value;

        if (!ket || !jumlah) {
          alert("Isi data dulu!");
          return;
        }

        await addDoc(collection(db, "transaksi"), {
          ket,
          jumlah,
          tipe,
          tanggal: new Date().toLocaleDateString(),
        });

        document.getElementById("ket").value = "";
        document.getElementById("jumlah").value = "";

        loadData();
      }

      window.tambah = tambah;

      loadData();
    </script>
  </body>
</html>
