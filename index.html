<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard Rejeki</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #f1f5f9;
      padding-bottom: 90px;
    }

    .header {
      background: linear-gradient(135deg, #eb5842, #a62511);
      color: white;
      padding: 25px 20px;
      border-radius: 0 0 25px 25px;
    }

    .balance {
      font-size: 32px;
      font-weight: bold;
      margin-top: 10px;
    }

    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin: 20px;
    }

    .summary-card {
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .summary-card small {
      color: gray;
    }

    .summary-card h3 {
      margin-top: 10px;
      margin-bottom: 0;
    }

    .income {
      color: green;
    }

    .expense {
      color: red;
    }

    .card {
      background: white;
      margin: 20px;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    input,
    select,
    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 15px;
    }

    button {
      background: #eb5842;
      color: white;
      border: none;
      font-weight: bold;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid #eee;
    }

    .item:last-child {
      border-bottom: none;
    }

    .item small {
      color: gray;
    }

    .nominal {
      font-weight: bold;
    }

    .menu-link {
      display: block;
      margin-top: 15px;
      text-align: center;
      text-decoration: none;
      color: #eb5842;
      font-weight: bold;
    }

    .nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: center;
      padding: 15px;
      border-top: 1px solid #ddd;
    }
  </style>
</head>

<body>

  <div class="header">
    <div>Total Saldo</div>
    <div class="balance" id="saldo">
      Rp 0
    </div>
  </div>

  <div class="summary">

    <div class="summary-card">
      <small>Pemasukan</small>
      <h3 class="income" id="masuk">
        Rp 0
      </h3>
    </div>

    <div class="summary-card">
      <small>Pengeluaran</small>
      <h3 class="expense" id="keluar">
        Rp 0
      </h3>
    </div>

  </div>

  <!-- FORM -->
  <div class="card">

    <h3>Tambah Transaksi</h3>

    <input
      type="text"
      id="ket"
      placeholder="Keterangan"
    />

    <input
      type="text"
      id="jumlah"
      placeholder="Jumlah"
    />

    <select id="tipe">
      <option value="masuk">Pemasukan</option>
      <option value="keluar">Pengeluaran</option>
    </select>

    <button onclick="tambah()">
      Tambah
    </button>

  </div>

  <!-- CHART -->
  <div class="card">

    <h3>Statistik</h3>

    <canvas id="chart"></canvas>

  </div>

  <!-- HISTORI -->
  <div class="card">

    <h3>Transaksi Terbaru</h3>

    <div id="list"></div>

    <a
      href="history.html"
      class="menu-link"
    >
      Lihat Semua →
    </a>

  </div>

  <div class="nav">
    Dashboard Rejeki
  </div>

  <script type="module">

    import {
      initializeApp
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      query,
      orderBy,
      limit,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDqjEEMwdxNqqnTdTVOeQN5kFA-zXGkgco",
      authDomain: "keuangan-app-a4183.firebaseapp.com",
      projectId: "keuangan-app-a4183",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let data = [];
    let chart;

    // FORMAT RUPIAH
    const inputJumlah =
      document.getElementById("jumlah");

    inputJumlah.addEventListener(
      "input",
      function () {

        let value =
          this.value.replace(/\D/g, "");

        this.value =
          value
            ? Number(value).toLocaleString("id-ID")
            : "";

      }
    );

    // LOAD DATA
    async function loadData() {

      const q = query(
        collection(db, "transaksi"),
        orderBy("createdAt", "desc"),
        limit(5)
      );

      const snapshot = await getDocs(q);

      data = [];

      snapshot.forEach((doc) => {
        data.push(doc.data());
      });

      render();

    }

    // RENDER
    async function render() {

      let saldo = 0;
      let masuk = 0;
      let keluar = 0;

      const semua =
        await getDocs(collection(db, "transaksi"));

      semua.forEach((doc) => {

        const d = doc.data();

        if (d.tipe === "masuk") {
          masuk += d.jumlah;
          saldo += d.jumlah;
        } else {
          keluar += d.jumlah;
          saldo -= d.jumlah;
        }

      });

      document.getElementById(
        "saldo"
      ).innerText =
        saldo.toLocaleString(
          "id-ID",
          {
            style: "currency",
            currency: "IDR",
          }
        );

      document.getElementById(
        "masuk"
      ).innerText =
        masuk.toLocaleString(
          "id-ID",
          {
            style: "currency",
            currency: "IDR",
          }
        );

      document.getElementById(
        "keluar"
      ).innerText =
        keluar.toLocaleString(
          "id-ID",
          {
            style: "currency",
            currency: "IDR",
          }
        );

      let html = "";

      data.forEach((d) => {

        let waktu = "-";

        if (d.createdAt?.seconds) {

          waktu =
            new Date(
              d.createdAt.seconds * 1000
            ).toLocaleString("id-ID");

        }

        html += `

          <div class="item">

            <div>
              <strong>${d.ket}</strong><br>
              <small>${waktu}</small>
            </div>

            <div class="
              nominal
              ${d.tipe === "masuk"
                ? "income"
                : "expense"}
            ">

              ${d.tipe === "masuk"
                ? "+"
                : "-"}

              ${d.jumlah.toLocaleString(
                "id-ID",
                {
                  style: "currency",
                  currency: "IDR",
                }
              )}

            </div>

          </div>

        `;

      });

      document.getElementById(
        "list"
      ).innerHTML = html;

      renderChart(masuk, keluar);

    }

    // CHART
    function renderChart(
      masuk,
      keluar
    ) {

      const ctx =
        document.getElementById("chart");

      if (chart) {
        chart.destroy();
      }

      chart = new Chart(ctx, {

        type: "doughnut",

        data: {

          labels: [
            "Pemasukan",
            "Pengeluaran"
          ],

          datasets: [{

            data: [
              masuk,
              keluar
            ]

          }]

        }

      });

    }

    // TAMBAH
    async function tambah() {

      const ket =
        document.getElementById("ket").value;

      const raw =
        document
          .getElementById("jumlah")
          .value
          .replace(/\./g, "");

      const jumlah = parseInt(raw);

      const tipe =
        document.getElementById("tipe").value;

      if (!ket || !jumlah) {

        alert("Isi data dulu");

        return;

      }

      await addDoc(
        collection(db, "transaksi"),
        {

          ket,
          jumlah,
          tipe,

          tanggal:
            new Date().toISOString(),

          createdAt:
            serverTimestamp()

        }
      );

      document.getElementById("ket").value = "";
      document.getElementById("jumlah").value = "";

      loadData();

    }

    window.tambah = tambah;

    loadData();

  </script>

</body>
</html>
